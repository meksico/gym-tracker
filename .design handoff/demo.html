<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Logs — TP-7 · vanilla</title>
<!--
  TP-7 GYM LOGS — VANILLA PORT DEMO
  ───────────────────────────────────────────────────────────────────────
  No React. No bundler. Pure ES Modules + DOM factory functions.
  Architecture mirrors your existing app:
    router.js  →  hashchange listener at bottom of this file
    components.js  →  tp7-ui.js  (h, icon, ui.*)
    app.css  →  tp7.css  (tokens + component classes)
  ───────────────────────────────────────────────────────────────────────
-->
<link rel="stylesheet" href="tp7.css">
<style>
  html, body { margin:0; height:100%; background:radial-gradient(circle at 50% 30%,#1c1c1c,#070707 70%); overflow:hidden; }
  /* phone bezel */
  #stage  { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  .bezel  { padding:10px; background:linear-gradient(160deg,#2a2a2a,#0c0c0c); border-radius:56px;
            box-shadow:0 0 0 2px #000, 0 30px 70px rgba(0,0,0,.6), inset 0 1px 1px rgba(255,255,255,.12); }
  .screen { position:relative; width:390px; height:844px; border-radius:46px; overflow:hidden;
            background:var(--bg-primary); display:flex; flex-direction:column;
            box-shadow:inset 0 0 0 1px rgba(0,0,0,.6); }
  /* status bar */
  .statusbar { flex:none; height:40px; display:flex; align-items:center; justify-content:space-between;
               padding:0 22px; font:var(--weight-semibold) var(--text-xs)/1 var(--font-mono);
               letter-spacing:.04em; color:var(--text-primary); }
  .statusbar .bars { display:flex; align-items:flex-end; gap:1.5px; height:9px; }
  .statusbar .bars i { display:block; width:3px; background:currentColor; }
  .statusbar .batt { width:22px; height:11px; border:1.5px solid currentColor; border-radius:2px; position:relative; }
  .statusbar .batt i { position:absolute; inset:1.5px; width:70%; background:currentColor; }
  /* app slot + scroll */
  #app  { flex:1; min-height:0; display:flex; flex-direction:column; }
  .scroll { flex:1; overflow-y:auto; }
  .scroll::-webkit-scrollbar { width:0; }
  /* home indicator */
  .home-ind { position:absolute; bottom:7px; left:50%; transform:translateX(-50%);
              width:132px; height:5px; border-radius:3px; background:var(--grey-500); opacity:.6; pointer-events:none; }
  /* shared app-bar */
  .appbar { display:flex; align-items:center; gap:12px; padding:14px 18px; flex:none;
            background:var(--bg-primary); border-bottom:1px solid var(--border-hairline);
            box-shadow:0 1px 0 rgba(255,255,255,.6); }
  /* entry dock (detail screen bottom) */
  .dock { flex:none; padding:14px 16px 16px; background:var(--bg-primary);
          border-top:1px solid var(--border-hairline);
          box-shadow:0 -1px 0 rgba(255,255,255,.6), 0 -8px 24px rgba(0,0,0,.12); }
</style>
</head>
<body class="tp7">

<div id="stage">
  <div class="bezel">
    <div class="screen">
      <div class="statusbar">
        <span style="font-variant-numeric:tabular-nums">9:41</span>
        <span style="display:flex;align-items:center;gap:6px">
          <span class="bars"><i style="height:3px"></i><i style="height:5px"></i><i style="height:7px"></i><i style="height:9px"></i></span>
          <span class="batt"><i></i></span>
        </span>
      </div>
      <div id="app"></div>
      <div class="home-ind"></div>
    </div>
  </div>
</div>

<script type="module">
import { h, icon, ui } from './tp7-ui.js';

/* ── STRINGS ─────────────────────────────────────────────────────────────
   Keep all user-visible text in one place — easy to swap with your i18n.
   Double quotes avoid conflicts with Ukrainian apostrophe (ʼ).        */
const T = {
  wordmark:    "GYM_LOGS",
  tagline:     "ЖУРНАЛ ТРЕНУВАНЬ",
  session:     "СЕСІЯ · СЬОГОДНІ",
  dayLabel:    "ПОНЕДІЛОК",
  dayToggle:   "ДЕНЬ",
  movesLabel:  "ВПРАВ",
  volLabel:    "ОБ\u2019ЄМ СЕСІЇ",    /* U+2019 typographic apostrophe */
  volUnit:     "КГ",
  technique:   "ТЕХНІКА",
  collapse:    "ЗГОРНУТИ",
  loggedToday: "ВИКОНАНО СЬОГОДНІ",
  noSets:      "ЩЕ НЕМАЄ ЗАПИСІВ",
  armPrompt:   "Озбройте лічильник і натисніть оранжеву клавішу.",
  setLabel:    "СЕТ",
  weightLabel: "ВАГА (КГ)",
  repsLabel:   "ПОВТОРЕННЯ",
  volShort:    "ОБ\u2019ЄМ",
  lastLabel:   "ОСТАННІЙ:",
  recordSet:   "ЗАПИСАТИ СЕТ",
  logged:      "ЗАПИСАНО",
  settings:    "НАЛАШТУВАННЯ",
  back:        "НАЗАД",
  connected:   "ПІДКЛЮЧЕНО · GOOGLE SHEETS",
  account:     "GOOGLE АКАУНТ",
  signOut:     "ВИЙТИ З АКАУНТУ",
};
const DAYS = [{ value:"mon", label:"ПН" }, { value:"wed", label:"СР" }, { value:"fri", label:"ПТ" }];

/* ── WORKOUT DATA ────────────────────────────────────────────────────────
   Replace this with your real IndexedDB / store load.
   Shape: { id, name, group, effort(0‒3), sets, repLo, repHi, last:[kg,reps], log:[[kg,reps]…] } */
const WORKOUT = [
  { id:"m1", name:"Жим лежачи",                         group:"ГРУДИ", effort:2, sets:3, repLo:8,  repHi:12, last:[60,10],  log:[] },
  { id:"m2", name:"Жим гантелями у нахилі",              group:"ГРУДИ", effort:2, sets:3, repLo:8,  repHi:12, last:[22,12],  log:[] },
  { id:"m3", name:"Жим з грудей у \u00abХаммер\u00bb",   group:"ГРУДИ", effort:2, sets:3, repLo:8,  repHi:12, last:[50,10],  log:[] },
  { id:"m4", name:"Тяга верхнього блока широким хватом", group:"СПИНА", effort:0, sets:3, repLo:8,  repHi:12, last:[45,12],  log:[[45,12],[45,12]] },
  { id:"m5", name:"Тяга верхнього блока за голову",      group:"СПИНА", effort:0, sets:3, repLo:8,  repHi:12, last:[40,12],  log:[] },
  { id:"m6", name:"Тяга до пояса (\u00abгребля\u00bb)",  group:"СПИНА", effort:0, sets:3, repLo:8,  repHi:12, last:[55,10],  log:[] },
];

/* ── ROUTER STATE ────────────────────────────────────────────────────────
   Mirrors your router.js. current = active exercise index when on #detail. */
let current = 0;
const app = document.getElementById("app");
const mount = (node) => { app.replaceChildren(node); };

/* ════════════════════════════════════════════════════════════════════════
   SCREEN: HOME
   ════════════════════════════════════════════════════════════════════════ */
function screenHome() {
  const total = WORKOUT.length;
  const done  = WORKOUT.filter((e) => e.log.length > 0).length;
  const vol   = WORKOUT.reduce((s, e) => s + e.log.reduce((a, [w, r]) => a + w * r, 0), 0);

  /* ── app bar ── */
  const bar = h("header", { class:"appbar" },
    icon("barbell", { size:26 }),
    h("div", { style:"flex:1" },
      h("div", { style:"font:var(--weight-bold) var(--text-lg)/1 var(--font-expanded);letter-spacing:.02em" }, T.wordmark),
      h("div", { class:"tp7-label", style:"margin-top:3px" }, T.tagline)),
    ui.iconButton("gear", { label:T.settings, onClick:() => navTo("#settings") }));

  /* ── session deck (dark screen card with reel + lit readouts) ── */
  const deck = h("div", { class:"tp7-card tp7-card--screen", style:"border-radius:var(--radius-lg);padding:16px" },
    h("div", { style:"display:flex;align-items:center;gap:18px" },
      ui.tapeReel(total ? done / total : 0, { size:96, label:`${done}/${total}`, spinning: done > 0 }),
      h("div", { style:"display:flex;flex-direction:column;gap:16px;flex:1" },
        h("div", {},
          h("div", { class:"tp7-readout__caption" }, T.session),
          h("div", { style:"font:var(--weight-bold) var(--text-lg)/1 var(--font-expanded);color:var(--grey-50)" }, T.dayLabel)),
        h("div", { style:"display:flex;gap:22px" },
          ui.litValue(T.movesLabel, `${done}/${total}`),
          ui.litValue(T.volLabel, vol.toLocaleString("en-US").replace(/,/g, "\u202F"), T.volUnit)))));

  /* ── day selector (mirrors your day-picker) ── */
  const dayRow = h("div", { style:"margin:22px 2px 12px" }, ui.eyebrow(T.dayToggle));
  const daySeg = ui.segmented(DAYS, "mon", () => {});

  /* ── exercise list ── */
  const list = h("div", { style:"display:flex;flex-direction:column;gap:10px;margin-top:16px" },
    ...WORKOUT.map((ex, i) => {
      const complete = ex.log.length >= ex.sets;
      const row = h("div", { class:"tp7-row", style:"padding:13px 14px",
        onclick:() => { current = i; navTo("#detail"); } },
        h("div", { style:"display:flex;gap:12px" },
          h("span", { class:"tp7-mono", style:"font-size:var(--text-sm);color:var(--text-tertiary);padding-top:1px;min-width:22px" },
            String(i + 1).padStart(2, "0")),
          h("div", { style:"flex:1;min-width:0" },
            h("div", { style:"display:flex;align-items:flex-start;justify-content:space-between;gap:10px" },
              h("div", { style:"flex:1;min-width:0;font:var(--weight-semibold) var(--text-md)/1.2 var(--font-sans);text-wrap:pretty" }, ex.name),
              ui.groupTag(ex.group)),
            h("div", { style:"display:flex;align-items:center;gap:14px;margin-top:11px" },
              ui.effortMeter(ex.effort),
              h("span", { class:"tp7-mono", style:"font-size:var(--text-xs);color:var(--text-secondary)" },
                `${ex.sets}\u00d7${ex.repLo}\u2013${ex.repHi}`),
              h("div", { style:"flex:1" }),
              ex.log.length
                ? (complete
                    ? ui.badge(T.logged, { variant:"solid" })
                    : h("span", { class:"tp7-mono", style:"font-size:var(--text-2xs);font-weight:700;color:var(--text-tertiary)" }, `${ex.log.length}/${ex.sets}`))
                : null,
              icon("chevR", { size:16 })))));
      return row;
    }));

  return h("div", { style:"display:flex;flex-direction:column;height:100%" },
    bar,
    h("div", { class:"scroll", style:"padding:16px 16px 28px" }, deck, dayRow, daySeg, list));
}

/* ════════════════════════════════════════════════════════════════════════
   SCREEN: DETAIL (exercise + set logging)
   ════════════════════════════════════════════════════════════════════════ */
function screenDetail() {
  const ex = WORKOUT[current];
  let weight = ex.last[0];
  let reps   = ex.last[1];
  const volNow = () => Math.round(weight * reps);

  /* volEl is mutated in-place when steppers change */
  const volEl = h("span", { class:"tp7-mono",
    style:"font-size:var(--text-md);font-weight:700;white-space:nowrap;color:var(--text-primary)" },
    `${volNow()} ${T.volUnit}`);
  const refreshVol = () => { volEl.textContent = `${volNow()} ${T.volUnit}`; };

  /* sets list — re-rendered on every log */
  const setsWrap = h("div", {});
  function renderSets() {
    if (!ex.log.length) {
      setsWrap.replaceChildren(
        h("div", { class:"tp7-card tp7-card--sunken", style:"text-align:center;padding:22px 18px" },
          h("div", { class:"tp7-mono",
            style:"font-size:var(--text-2xs);font-weight:600;letter-spacing:var(--tracking-wide);text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px" },
            T.noSets),
          h("div", { style:"font:var(--weight-regular) var(--text-sm)/1.4 var(--font-sans);color:var(--text-tertiary);max-width:240px;margin:0 auto" },
            T.armPrompt)));
    } else {
      setsWrap.replaceChildren(
        h("div", { style:"display:flex;flex-direction:column;gap:7px" },
          ...ex.log.map(([w, r], i) =>
            h("div", { style:"display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg-sunken);border:1px solid var(--border-channel);box-shadow:var(--shadow-inset);border-radius:var(--radius-sm)" },
              h("span", { class:"tp7-mono", style:"font-size:var(--text-2xs);font-weight:700;letter-spacing:var(--tracking-wide);color:var(--text-tertiary);min-width:46px" },
                `${T.setLabel} ${i + 1}`),
              h("span", { class:"tp7-mono", style:"font-size:var(--text-md);font-weight:600" },
                `${w} ${T.volUnit} \u00d7 ${r}`),
              h("div", { style:"flex:1" }),
              h("span", { class:"tp7-mono", style:"font-size:var(--text-xs);color:var(--text-tertiary)" },
                `${Math.round(w * r)} ${T.volUnit}`),
              icon("pencil", { size:15 })))));
    }
  }
  renderSets();

  /* header */
  const bar = h("header", { class:"appbar", style:"align-items:flex-start;padding:12px 16px" },
    ui.iconButton("back", { label:T.back, onClick:() => navTo("#home") }),
    h("div", { style:"flex:1;min-width:0" },
      h("div", { style:"font:var(--weight-bold) var(--text-md)/1.15 var(--font-sans);text-wrap:pretty" }, ex.name),
      h("div", { class:"tp7-mono", style:"margin-top:4px;font-size:var(--text-xs);color:var(--text-secondary)" },
        `${ex.group} \u00b7 ${ex.sets} \u00d7 ${ex.repLo}\u2013${ex.repHi}`)),
    h("span", { class:"tp7-mono", style:"font-size:var(--text-2xs);color:var(--text-tertiary);margin-top:4px" },
      String(current + 1).padStart(2, "0")));

  /* technique button */
  let videoOpen = false;
  const videoPnl = h("div", {});
  const techBtn = ui.button(T.technique, { size:"lg", block:true, startIcon:icon("play", { size:13 }) });
  techBtn.style.justifyContent = "flex-start";
  techBtn.onclick = () => {
    videoOpen = !videoOpen;
    techBtn.replaceChildren(icon(videoOpen ? "stop" : "play", { size:13 }),
      document.createTextNode(videoOpen ? T.collapse : T.technique));
    videoPnl.style.display = videoOpen ? "block" : "none";
  };
  videoPnl.style.cssText = "display:none;margin-top:10px;aspect-ratio:16/9;border-radius:var(--radius-md);overflow:hidden;background:var(--surface-screen);border:1px solid #000;box-shadow:var(--shadow-inset);display:none;align-items:center;justify-content:center";
  videoPnl.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px">
    <div style="font:var(--weight-semibold) var(--text-2xs)/1 var(--font-mono);letter-spacing:var(--tracking-wide);text-transform:uppercase;color:var(--grey-500)">${T.technique} · YOUTUBE</div>
  </div>`;

  /* reel (re-rendered when sets logged) */
  let reelEl = ui.tapeReel(Math.min(1, ex.log.length / ex.sets), { size:48, label:`${ex.log.length}/${ex.sets}` });
  const reelWrap = h("div", { style:"flex:none" }, reelEl);

  /* recall button */
  const recallBtn = h("button", { type:"button",
    style:"appearance:none;flex:1;display:flex;align-items:center;justify-content:center;gap:8px;height:34px;cursor:pointer;background:var(--bg-sunken);border:1px solid var(--border-channel);box-shadow:var(--shadow-inset);border-radius:var(--radius-sm);font:var(--weight-medium) var(--text-xs)/1 var(--font-mono);color:var(--text-secondary)",
    onclick:() => { weight = ex.last[0]; reps = ex.last[1]; refreshVol(); rebuildSteppers(); } },
    icon("ret", { size:14 }),
    h("b", { style:"text-transform:uppercase;letter-spacing:var(--tracking-wide)" }, T.lastLabel + " "),
    document.createTextNode(`${ex.last[0]} ${T.volUnit} \u00d7 ${ex.last[1]}`));

  /* steppers row */
  const stepRow = h("div", { style:"display:flex;gap:12px" });
  function rebuildSteppers() {
    stepRow.replaceChildren(
      ui.stepper(T.weightLabel, weight, { step:2.5, min:0, onChange:(v) => { weight = v; refreshVol(); } }),
      ui.stepper(T.repsLabel,   reps,   { step:1,   min:1, onChange:(v) => { reps = v;   refreshVol(); } }));
  }
  rebuildSteppers();

  /* record key (THE orange action — one per view) */
  const recordBtn = ui.button(T.recordSet, { variant:"critical", size:"lg", block:true, startIcon:icon("record", { size:13 }),
    onClick:() => {
      ex.log.push([weight, reps]);
      ex.last = [weight, reps];
      renderSets();
      /* update reel */
      const newReel = ui.tapeReel(Math.min(1, ex.log.length / ex.sets), { size:48, label:`${ex.log.length}/${ex.sets}` });
      reelWrap.replaceChildren(newReel);
    } });

  const dock = h("div", { class:"dock" },
    h("div", { style:"display:flex;align-items:center;gap:10px;margin-bottom:12px" }, recallBtn, reelWrap),
    stepRow,
    h("div", { style:"display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 0" },
      h("span", { class:"tp7-mono", style:"font-size:var(--text-2xs);font-weight:600;letter-spacing:var(--tracking-wide);text-transform:uppercase;color:var(--text-secondary)" }, T.volShort),
      volEl),
    recordBtn);

  return h("div", { style:"display:flex;flex-direction:column;height:100%" },
    bar,
    h("div", { class:"scroll", style:"padding:14px 16px 18px" },
      techBtn, videoPnl,
      h("div", { style:"display:flex;align-items:center;justify-content:space-between;margin:20px 2px 10px" },
        ui.eyebrow(T.loggedToday),
        h("span", { class:"tp7-mono", style:"font-size:var(--text-2xs);font-weight:700;color:var(--text-tertiary)" },
          `${ex.log.length}/${ex.sets}`)),
      setsWrap),
    dock);
}

/* ════════════════════════════════════════════════════════════════════════
   SCREEN: SETTINGS
   ════════════════════════════════════════════════════════════════════════ */
function screenSettings() {
  return h("div", { style:"display:flex;flex-direction:column;height:100%" },
    h("header", { class:"appbar", style:"padding:14px 16px" },
      ui.iconButton("back", { label:T.back, onClick:() => navTo("#home") }),
      h("div", { style:"font:var(--weight-bold) var(--text-lg)/1 var(--font-expanded)" }, T.settings)),
    h("div", { class:"scroll", style:"padding:18px 16px" },
      /* connection chip */
      h("div", { style:"margin-bottom:16px" },
        h("span", { style:"display:inline-flex;align-items:center;gap:8px;height:26px;padding:0 12px;background:var(--bg-sunken);border:1px solid var(--border-channel);box-shadow:var(--shadow-inset);border-radius:var(--radius-sm);font:var(--weight-bold) var(--text-2xs)/1 var(--font-mono);letter-spacing:var(--tracking-wide);color:var(--text-secondary)" },
          h("span", { style:"width:7px;height:7px;border-radius:50%;background:var(--orange-500);box-shadow:0 0 8px rgba(255,79,0,.6)" }),
          T.connected)),
      /* account card */
      h("div", { class:"tp7-card", style:"border-radius:var(--radius-lg);padding:18px" },
        h("div", { style:"display:flex;align-items:center;gap:14px;margin-bottom:16px" },
          /* avatar */
          h("div", { style:"width:48px;height:48px;border-radius:50%;flex:none;background:radial-gradient(circle at 50% 35%,var(--grey-800),var(--grey-950));border:1px solid #000;box-shadow:var(--shadow-key);display:flex;align-items:center;justify-content:center;font:var(--weight-bold) 16px/1 var(--font-mono);color:var(--grey-50)" }, "EG"),
          h("div", {},
            h("div", { class:"tp7-label" }, T.account),
            h("div", { style:"margin-top:5px;font:var(--weight-medium) var(--text-sm)/1.3 var(--font-sans)" }, "Eugene Garkavtsev"),
            h("div", { class:"tp7-mono", style:"font-size:var(--text-xs);color:var(--text-tertiary)" }, "meksico@gmail.com"))),
        ui.button(T.signOut, { block:true }))));
}

/* ── HASH ROUTER (same contract as your router.js) ────────────────────── */
const ROUTES = {
  "#home":     screenHome,
  "#detail":   screenDetail,
  "#settings": screenSettings,
};
function navTo(hash) { location.hash = hash; }
function render() { mount((ROUTES[location.hash] || screenHome)()); }
window.addEventListener("hashchange", render);
render();
</script>
</body>
</html>
